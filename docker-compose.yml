services:
  ollama:
    image: ollama/ollama:latest
    container_name: emoratio-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-pull:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "curl -s http://ollama:11434/api/pull -d '{\"name\": \"llama3.2:3b\"}' && echo 'Model pulled'"

  bot:
    build: .
    container_name: emoratio-bot
    restart: unless-stopped
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    env_file: .env
    environment:
      OLLAMA_URL: http://ollama:11434
    volumes:
      - bot_data:/app/data

volumes:
  ollama_data:
  bot_data:
